<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GoTunnel · Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #1f1f1f;
  --border-focus: #333333;
  --text: #ededed;
  --text-2: #a1a1a1;
  --text-3: #555555;
  --accent: #fff;
  --accent-bg: #ffffff;
  --accent-text: #0a0a0a;
  --error: #ff4444;
  --error-bg: rgba(255,68,68,.06);
  --error-border: rgba(255,68,68,.2);
  --input-bg: #0f0f0f;
  --r: 8px;
}

body {
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}

/* subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

/* top-center radial light */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse at center, rgba(255,255,255,.03) 0%, transparent 70%);
  pointer-events: none;
}

.wrap {
  width: 100%;
  max-width: 360px;
  position: relative;
  z-index: 1;
  animation: up .35s cubic-bezier(.16,1,.3,1);
}

@keyframes up {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.logo-row {
  text-align: center;
  margin-bottom: 32px;
}

.logo-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 14px;
}

.logo-icon svg {
  width: 20px;
  height: 20px;
}

.logo-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.2px;
}

.logo-sub {
  font-size: 13px;
  color: var(--text-2);
  margin-top: 4px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 28px 24px;
}

.error {
  display: none;
  align-items: center;
  gap: 8px;
  background: var(--error-bg);
  border: 1px solid var(--error-border);
  border-radius: var(--r);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--error);
  margin-bottom: 20px;
}
.error.show { display: flex; animation: shake .25s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  30%      { transform: translateX(-5px); }
  70%      { transform: translateX(5px); }
}

.field { margin-bottom: 14px; }

label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 6px;
}

input {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 13px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
input::placeholder { color: var(--text-3); }
input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(255,255,255,.04);
}

.submit {
  width: 100%;
  margin-top: 6px;
  padding: 10px;
  border: none;
  border-radius: var(--r);
  background: var(--accent-bg);
  color: var(--accent-text);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: opacity .15s, box-shadow .15s;
  letter-spacing: -.1px;
}
.submit:hover { opacity: .9; box-shadow: 0 2px 12px rgba(255,255,255,.08); }
.submit:active { opacity: .85; }

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 22px 0 16px;
}

.footer {
  text-align: center;
  font-size: 12px;
  color: var(--text-3);
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" color="#ededed">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="logo-name">GoTunnel</div>
    <div class="logo-sub">Sign in to your dashboard</div>
  </div>

  <div class="card">
    <div id="err" class="error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Invalid username or password
    </div>

    <form method="POST" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" autocomplete="username" placeholder="admin" autofocus spellcheck="false">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" autocomplete="current-password" placeholder="Enter your password">
      </div>
      <button type="submit" class="submit">Continue</button>
    </form>
  </div>

  <hr class="divider">
  <div class="footer">GoTunnel · secured session</div>
</div>
<script>
if (new URLSearchParams(window.location.search).has('error'))
  document.getElementById('err').classList.add('show');
</script>
</body>
</html>
