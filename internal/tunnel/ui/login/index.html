<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<title>GoTunnel — Sign In</title>
<meta name="description" content="Secure dashboard login for GoTunnel.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2L2 7l10 5 10-5-10-5z'/><path d='M2 17l10 5 10-5'/><path d='M2 12l10 5 10-5'/></svg>">
<link rel="stylesheet" href="/login/styles.css">
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="nav-name">GoTunnel</span>
  </div>
  <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark theme" style="margin-left: auto;">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
  </button>
</nav>

<div class="layout">
  <main class="login-container">
    <section class="login-card">
      <div class="form-head">
        <h2 class="heading">Sign in</h2>
        <p class="sub">Enter your dashboard credentials to continue.</p>
      </div>

      <div id="error-msg" class="alert error hidden" role="alert" aria-live="assertive"></div>

      <form method="POST" action="/login" id="login-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            required
            aria-required="true"
            placeholder="Username"
          >
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="pass-wrap">
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              required
              aria-required="true"
              placeholder="Password"
            >
            <button type="button" id="toggle-pass" class="pass-toggle" aria-label="Show password" title="Show password">
              <svg id="pass-icon-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="pass-icon-hide" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn" class="btn btn-primary" aria-label="Sign in to GoTunnel">
            <span id="submit-label">Sign in</span>
            <span id="submit-spinner" class="spinner hidden" aria-hidden="true"></span>
          </button>
        </div>
      </form>
      
      <div class="card-footer">
        <p>GoTunnel — Secure tunnel management</p>
      </div>
    </section>
  </main>
</div>

<script src="/login/script.js" defer></script>
</body>
</html>
